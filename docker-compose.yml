services:
  api:
    build:
      context: .
      dockerfile: src/GoalAnthem.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5188:8080"

  web:
    image: node:22-alpine
    working_dir: /workspace/src/GoalAnthem.Web
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:5188
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
    depends_on:
      - api
