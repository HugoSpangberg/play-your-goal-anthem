name: Pull request

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/GoalAnthem.Web/package-lock.json

      - name: Restore backend
        run: dotnet restore GoalAnthem.sln

      - name: Check backend formatting
        run: dotnet format GoalAnthem.sln --verify-no-changes --no-restore

      - name: Build backend
        run: dotnet build GoalAnthem.sln --configuration Release --no-restore

      - name: Test backend
        run: dotnet test GoalAnthem.sln --configuration Release --no-build

      - name: Install frontend
        run: npm ci
        working-directory: src/GoalAnthem.Web

      - name: Lint frontend
        run: npm run lint
        working-directory: src/GoalAnthem.Web

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: src/GoalAnthem.Web

      - name: Test frontend
        run: npm run test
        working-directory: src/GoalAnthem.Web

      - name: Build frontend
        run: npm run build
        working-directory: src/GoalAnthem.Web
